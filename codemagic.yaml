workflows:
  ios-workflow:
    name: Together iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kricliff.together
      node: latest
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps
      - name: Capacitor copy
        script: npx cap copy ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update
      - name: Set build number
        script: |
          cd ios/App
          xcrun agvtool new-version -all $BUILD_NUMBER
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
      - name: Upload to TestFlight
        script: |
          app-store-connect publish \
            --path $(find . -name "*.ipa") \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  android-workflow:
    name: Together Android Google Play
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      android_signing:
        - together_keystore
      node: latest
      java: 17
    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps
      - name: Capacitor sync
        script: npx cap sync android
      - name: Set version code
        script: |
          cd android
          LATEST=$(google-play get-latest-build-number --package-name "com.kricliff.together" --tracks internal) || LATEST=0
          echo "versionCode=$((LATEST + 1))" >> app/version.properties
      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/mapping/release/mapping.txt
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
