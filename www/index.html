  .switch input:checked + .sl { background: var(--teal); }

  .progBar { height: 8px; background: var(--border); border-radius: 999px; overflow: hidden; margin: 8px 0 4px; }
  .progBar div { height: 100%; background: linear-gradient(90deg, var(--teal-dark), var(--teal)); border-radius: 999px; }
  .articleBody { font-size: 0.95rem; line-height: 1.6; }
  .articleBody p { margin-bottom: 12px; }
  .feedItem { display: flex; gap: 10px; align-items: flex-start; font-size: 0.88rem; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .feedItem:last-child { border-bottom: none; }
  .empty { color: var(--text-soft); font-size: 0.88rem; text-align: center; padding: 14px 0; }
  .proTag { display:inline-block;font-size:0.62rem;font-weight:700;letter-spacing:0.06em;background:var(--coral);color:#fff;border-radius:4px;padding:2px 7px;vertical-align:middle;margin-left:5px }
  .toast { position: absolute; bottom: 95px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 10px 18px; border-radius: 999px; font-size: 0.85rem; z-index: 60; white-space: nowrap; animation: toastIn 0.25s ease; }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* ── Splash animation ── */
  #splash {
    position: absolute; inset: 0; z-index: 200;
    background: #1f4f4f;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    animation: splashExit 0.5s ease 2.3s both;
    pointer-events: none;
  }
  #splashSvg { overflow: visible; }
  #splashGL { animation: splashFromLeft  0.7s cubic-bezier(0.34, 1.35, 0.64, 1) 0.2s both; }
  #splashGR { animation: splashFromRight 0.7s cubic-bezier(0.34, 1.35, 0.64, 1) 0.2s both; }
  #splashLens { opacity: 0; animation: splashFadeIn 0.35s ease 0.75s both; }
  #splashWord {
    font-family: 'Outfit', -apple-system, sans-serif;
    font-size: 1.6rem; font-weight: 500;
    color: rgba(255,255,255,0.88); letter-spacing: 0.12em;
    margin-top: 20px; opacity: 0;
    animation: splashWordIn 0.55s ease 1.05s both;
  }
  @keyframes splashFromLeft  { from { transform: translateX(-60px); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes splashFromRight { from { transform: translateX( 60px); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes splashFadeIn    { from { opacity: 0; } to { opacity: 1; } }
  @keyframes splashWordIn    { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes splashExit      { to { opacity: 0; } }

<script>
"use strict";

const LS_KEY = "together_state_v1";
const todayStr = () => new Date().toISOString().slice(0, 10);

const defaultState = {
  pseudonym: "Stillwater" + Math.floor(100 + Math.random() * 900),
  moods: {},
  completedExercises: [],
  activePrograms: [],
  posts: [],
  reactions: {},
  settings: { notifications: true, notifTime: "09:00", crisisContact: "", icloudPromptDismissed: false },
  dismissedNudges: {},
  reflections: {},
  journal: [],
  sleep: {},
  socialGoal: null,
  weeklySummary: {},
  guidelinesAccepted: false,
  blocked: [],
  hiddenPosts: [],
};

let state = loadState();
function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      const merged = Object.assign(structuredClone(defaultState), saved);
      merged.settings = Object.assign(structuredClone(defaultState.settings), saved.settings || {});
      if (!Array.isArray(merged.activePrograms)) {
        merged.activePrograms = merged.activeProgram ? [merged.activeProgram] : [];
      }
      delete merged.activeProgram;
      return merged;
    }
  } catch (e) {}
  return structuredClone(defaultState);
}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(state)); scheduleICloudPush(); }

/* ---------- iCloud sync (restore data after delete/reinstall) ---------- */
let _icloudPushTimer = null;
function scheduleICloudPush() {
  const ic = window.Capacitor?.Plugins?.ICloudSync;
  if (!ic) return;
  clearTimeout(_icloudPushTimer);
  _icloudPushTimer = setTimeout(() => {
    ic.setValue({ value: JSON.stringify(state) }).catch(() => {});
  }, 2000);
}
function stateLooksFresh() {
  return Object.keys(state.moods).length === 0
    && state.completedExercises.length === 0
    && (state.journal || []).length === 0
    && (state.posts || []).length === 0;
}
async function checkICloudRestore() {
  const ic = window.Capacitor?.Plugins?.ICloudSync;
  if (!ic || state.settings.icloudPromptDismissed || !stateLooksFresh()) return;
  try {
    const { available } = await ic.isAvailable();
    if (!available) return;
    const { value } = await ic.getValue();
    if (!value) return;
    const parsed = JSON.parse(value);
    if (!parsed || typeof parsed !== "object" || !("pseudonym" in parsed)) return;
    // Don't prompt if the iCloud copy is itself empty (nothing meaningful to restore)
    const hasContent = Object.keys(parsed.moods || {}).length > 0
      || (parsed.completedExercises || []).length > 0
      || (parsed.journal || []).length > 0
      || (parsed.posts || []).length > 0;
    if (!hasContent) return;
    openModal(`
      <h3>${t("icloud_found_title")}</h3>
      <div class="sub" style="margin-bottom:14px">${t("icloud_found_body")}</div>
      <button class="btn" style="width:100%;margin-bottom:8px" onclick="restoreFromICloud()">${t("icloud_restore_btn")}</button>
      <button class="btn secondary" style="width:100%" onclick="dismissICloudPrompt()">${t("icloud_fresh_btn")}</button>
    `);
    window._icloudPending = parsed;
  } catch (e) { /* silent — iCloud unavailable or not signed in */ }
}
function restoreFromICloud() {
  const parsed = window._icloudPending;
  if (!parsed) { closeModal(); return; }
  state = Object.assign(structuredClone(defaultState), parsed);
  state.settings = Object.assign(structuredClone(defaultState.settings), parsed.settings || {});
  state.settings.icloudPromptDismissed = true;
  save(); closeModal(); render();
  toast(t("icloud_restored_toast"));
}
function dismissICloudPrompt() {
  state.settings.icloudPromptDismissed = true;
  save(); closeModal();
}

/* ---------- i18n (Norwegian + English) ---------- */
function detectLang() { const l = (navigator.language || "en").toLowerCase(); return (l.startsWith("nb") || l.startsWith("nn") || l.startsWith("no")) ? "no" : "en"; }
if (!state.settings.lang) state.settings.lang = detectLang();
function L() { return state.settings.lang || "en"; }
function t(k) { const d = T[L()]; return (d && d[k] != null) ? d[k] : (T.en[k] != null ? T.en[k] : k); }
function setLang(l) { state.settings.lang = l; save(); render(); }
const T = {
  en: {
    nav_home: "Home", nav_training: "Training", nav_community: "Community", nav_learn: "Learn", nav_profile: "Profile",
    crisis_support: "Crisis support",

    found_broken: "Found something broken?", report_fix: "Report it and we'll fix it.",
    backup_desc: "Copy this backup and keep it somewhere safe (Notes, email, or Files). If you delete or reinstall the app, paste it back under Restore to get your data back.",
    copy_backup: "Copy backup", share_btn: "Share…", close: "Close",
    restore_desc: "Paste a backup you saved earlier. This replaces all data currently in the app.",
    restore_ph: "Paste your backup here", restore_replace: "Restore and replace", cancel: "Cancel",
    saved: "Saved", backup_copied: "Backup copied. Save it somewhere safe.", data_restored: "Data restored.",
    paste_first: "Paste a backup first.", invalid_backup: "That doesn't look like a valid backup.", not_together_backup: "That doesn't look like a Together backup.",
    mood_heavy: "Heavy", mood_low: "Low", mood_okay: "Okay", mood_good: "Good",
    greeting_morning: "Good morning", greeting_afternoon: "Good afternoon", greeting_evening: "Good evening",
    home_sub: "How are you doing today, really?",
    todays_message: "Today's message", todays_mood: "Today's mood",
    mood_note_ph: "A few words about the day? Optional, completely private.", save_note: "Save note",
    mood_chart: "Mood chart", last_30_days: "last 30 days", days_ago_30: "30 days ago", today_lbl: "Today",
    mood_chart_locked_desc: "See the pattern in your mood over 30 days.",
    sleep_energy: "Sleep and energy", logged: "Logged", log: "Log",
    sleep_energy_locked_desc: "Log sleep and energy daily. Spot the patterns over time.",
    social_goal_label: "THIS WEEK'S SOCIAL GOAL", mark_done: "Mark as done", done_this_week: "✓ Done this week",
    todays_exercise: "Today's exercise", start: "Start",
    journal: "Journal", my_notes: "📓 My notes", open_arrow: "Open →",
    notes_saved_privately: "notes saved privately",

    ex_reframe_steps: ["What's the thought taking up space right now? Say it to yourself, briefly.", "How true is it, from 0 to 100%?", "What would you say to a good friend who thought the same?", "Formulate a more balanced version of the thought.", "Notice whether your body relaxes a little."],

    focus_sleep: ["Map your evening routine as it actually is.", "Screen-free for the last 30 minutes before bed.", "Fixed bedtime, weekends too.", "Bedroom: dark, cool, quiet."],
    focus_transition: ["Name what has actually been lost, and what remains.", "What do you have control over today? Do one of those things.", "Talk to one person about how you're really doing.", "Small routines bring stability when the big things are in flux."],
    focus_confidence: ["Write down three situations you've handled well before.", "Practise taking up space: say one opinion out loud today.", "Replace 'I have to perform' with 'I'm here to contribute'.", "Posture affects how you feel. Test it today."],
    focus_father: ["Ten minutes of undivided attention, phone away.", "Apologise if you get it wrong. It builds trust.", "Notice what triggers your impatience.", "Tell your partner one thing you appreciate about them."],
    refl_r1_title: "What are you really afraid of?", refl_r1_prompt: "Not what you admit in company. The fear you sit with at night, alone, the one you rarely put into words. What is it?",
    refl_r2_title: "Who would you be without others' expectations of you?", refl_r2_prompt: "Imagine all roles and demands fell away tomorrow. No expectations from work, family, or society. Who are you then, and what do you want?",
    refl_r3_title: "What have you never said out loud to anyone?", refl_r3_prompt: "Something you've carried for years without voicing it to another person. What is it? Write it here, just for yourself.",
    refl_r4_title: "What are you trying to prove, and to whom?", refl_r4_prompt: "Behind much of what we do is a need to prove something. Maybe to a parent, an old version of yourself, or someone who doubted you. Who are you really doing it for?",
    refl_r5_title: "What would a younger you have needed to hear?", refl_r5_prompt: "Picture yourself at 10–12 years old. What did that boy need to hear from a trusted adult? What did he never hear, and what does it mean that he didn't?",
    refl_r6_title: "What are you unwilling to look at in yourself?", refl_r6_prompt: "We all have parts of ourselves we'd rather avoid. A tendency, a fear, a side we justify or numb. What is that for you?",
    refl_r7_title: "What have you lost that you've never grieved?", refl_r7_prompt: "A dream you set aside. A relationship that faded. A version of yourself you never became. What have you lost quietly, without letting yourself feel it?",
    refl_r8_title: "What is actually enough for you?", refl_r8_prompt: "Not what you say is enough. What are you really chasing, and what would it take for you to genuinely say: this is enough?",
    refl_r9_title: "What are you afraid people will really see?", refl_r9_prompt: "Behind the best version of yourself you show the world, what are you afraid they'll discover? What are you working hardest to hide?",
    refl_r10_title: "What actually matters to you?", refl_r10_prompt: "Strip away the job, the titles, the status, the things you're supposed to care about. What's left that genuinely matters, and are you living by it?",
    refl_r11_title: "What have you never forgiven yourself for?", refl_r11_prompt: "We all carry something. A mistake, a decision, something you didn't do when you should have. What is it, and what would it mean to let it go?",
    refl_r12_title: "Who do you allow yourself to need something from?", refl_r12_prompt: "Who in your life sees you when you're struggling, and do they know it? What does it do to you to need something from someone, and who is it safe to show that to?",
    learn_title: "Learn", learn_sub: "Short reads. No fluff.",
    articles_h2: "Articles", more_btn: "↺ More", research_h2: "Research", next_btn2: "↺ Next",
    finding_lbl: "📊 Finding", read_source: "Read source ↗",
    myths_h2: "Myths vs. facts", new_btn: "↺ New", myth_tag: "MYTH", fact_tag: "FACT",
    min_read: "min read", want_deeper: "Want to go deeper? The", days_step: "programme (", days_takes: "days) takes you through it step by step.",

    art_a1_title: "Performance anxiety when demands take over", art_a1_cat: "Performance",
    art_a1_body: ["Performance anxiety rarely comes from the task itself. It comes from what you think it means about you if things go wrong.", "Your body's alarm response — racing heart, restlessness, racing thoughts — is the same whether the threat is a bear or a presentation. Your brain is trying to protect you. It's just a bit too eager.", "What helps: lower the mental stakes ('this is one meeting, not a verdict'), breathe longer on the exhale than the inhale, and practise the situation in small doses rather than avoiding it.", "Avoidance brings relief today and more anxiety tomorrow. Gradual exposure does the opposite."],
    art_a2_title: "Anger is often something else", art_a2_cat: "Anger",
    art_a2_body: ["For many men, anger is the only feeling that seems 'allowed'. Underneath is often something else: worry, shame, helplessness, hurt.", "Next time you feel it rising: try to name what happened a second before. Did you feel overruled? Unheard? Afraid of failing?", "Anger isn't dangerous in itself. It's information. The question is what you do with it, and whether the people around you have to bear the cost.", "A practical rule: pause before responding when your pulse is high. You can always return to the conversation. What you say in full anger you can rarely take back."],
    art_a3_title: "Loneliness among men", art_a3_cat: "Loneliness",
    art_a3_body: ["Many men have colleagues, training partners and family, and are still lonely. Because none of those relationships have room for what actually weighs on them.", "Male friendships are often built around activity, not conversation. That's not wrong, but it means the heavy stuff never gets space.", "The good news: it takes less than you think. One honest sentence — 'it's been a tough stretch, actually' — opens more than a hundred surface-level conversations.", "Start with the friend you think can handle it best. He's probably been waiting for a chance to say something real himself."],
    art_a4_title: "Who am I without the job?", art_a4_cat: "Identity",
    art_a4_body: ["When your identity is largely built on what you achieve, a career change, redundancy or retirement becomes more than practical. It becomes existential.", "Ask yourself: what did people value in me before my title? Your temperament? Your calm? Your ability to fix things? That doesn't disappear with the job.", "Transition periods are uncomfortable because the old is gone and the new hasn't taken shape yet. It's a middle phase, not a final destination.", "Use the time to explore, not conclude. Identity is built through action, not rumination."],
    art_a5_title: "First-time father", art_a5_cat: "Fatherhood",
    art_a5_body: ["Many fathers feel a mixture of love, detachment and inadequacy in the early months. It's common, and almost nobody talks about it.", "Bonding isn't always a lightning bolt. For many it builds gradually, through nappy changes, carrying, and sleepless nights. It counts just as much.", "You don't need to be perfect. The research is clear: 'good enough' and repair after mistakes is what builds secure children.", "And: look after the relationship. The early years with young children are one of the hardest periods for a couple. Short, honest check-ins with your partner are underrated."],
    art_a6_title: "Burnout: how to recognise it before it's too late", art_a6_cat: "Burnout",
    art_a6_body: ["Burnout doesn't announce itself. It creeps in as reduced motivation, shorter patience, and a growing numbness toward things that used to matter.", "The three core signs: emotional exhaustion (nothing left to give), depersonalisation (feeling detached, going through the motions), and a reduced sense of accomplishment.", "Men often mask burnout with more work, alcohol, or withdrawal. The instinct to push through is understandable — but it accelerates the process.", "Recovery takes time. The first step is usually the hardest: admitting to yourself that something is wrong."],
    art_a7_title: "How men grieve — and why it looks different", art_a7_cat: "Grief",
    art_a7_body: ["Men grieve. They just often don't do it the way we expect grief to look.", "Where women are more likely to process loss through talking, men more often grieve through action — staying busy, taking care of practical things, exercising, or withdrawing temporarily.", "Neither is better. Both are valid. The danger for men is when temporary withdrawal becomes permanent avoidance.", "If you've lost someone: you don't have to talk about it. But notice when the numbness stops being a phase and starts being a wall."],
    art_a8_title: "When stress shows up in the body", art_a8_cat: "Stress",
    art_a8_body: ["Many men notice stress physically before they notice it emotionally: tight shoulders, jaw clenching, trouble sleeping, chest tightness, headaches.", "This isn't weakness — it's how the nervous system works. Stress is a physical state, not just a thought.", "The body often knows something is wrong before the mind admits it. If you're grinding your teeth at night, it's worth asking: what am I carrying that I haven't named yet?", "Short-term interventions that work: cold water on the face, slow exhalation, physical movement, and changing your environment — even briefly."],
    art_a9_title: "How to start a difficult conversation", art_a9_cat: "Relationships",
    art_a9_body: ["Most difficult conversations never happen because neither person knows how to start. The silence grows. The distance increases.", "A simple opener that works: 'I want to talk about something, and I'm not sure how to say it.' It signals honesty, and it buys you a moment to find the words.", "Time it well: not after a conflict, not at bedtime, not in front of others. A walk side by side is often easier than face to face.", "You don't need to resolve everything in one conversation. Starting is enough."],
    art_a10_title: "Sleep and mental health: the link most men underestimate", art_a10_cat: "Sleep",
    art_a10_body: ["Poor sleep is both a symptom and a cause of poor mental health. The relationship runs in both directions.", "After one night of less than 6 hours, emotional reactivity increases by up to 60%. You're more likely to snap, withdraw, catastrophise, or make poor decisions.", "Men consistently underreport sleep problems. The cultural script says power through. The research says that's one of the most expensive things you can do.", "Practical: a consistent wake time (even on weekends) is more effective than early bedtimes. Reduce screens 30 minutes before bed — not for the light, but to let your mind decelerate."],
    myth_1_myth: "Real men handle things themselves.", myth_1_fact: "Asking for help takes more confidence than pretending everything's fine. Most of those who've done it only regret waiting so long.",
    myth_2_myth: "Talking about problems makes them bigger.", myth_2_fact: "Research shows the opposite: putting feelings into words reduces activity in the brain's alarm system.",
    myth_3_myth: "Therapy is for people in crisis.", myth_3_fact: "Mental training works like physical training. It's most effective before things become acute.",
    myth_4_myth: "Medication is the only solution if it's serious.", myth_4_fact: "Conversation, physical activity, sleep and community all have documented effects, alone or in combination.",
    myth_5_myth: "Feeling anxious means you're weak.", myth_5_fact: "Anxiety is the nervous system doing its job — often too well. Elite athletes, surgeons, and leaders all experience it. The difference is in how they relate to it.",
    myth_6_myth: "Men don't get depressed, they just get on with it.", myth_6_fact: "Men experience depression at similar rates to women but are far less likely to be diagnosed. Irritability, withdrawal, and overworking are common male presentations that get missed.",
    myth_7_myth: "Asking for help burdens the people around you.", myth_7_fact: "Research consistently shows that people asked for support feel more connected and valued — not burdened. Vulnerability invites closeness.",
    myth_8_myth: "If you can't fix it, there's no point talking about it.", myth_8_fact: "Being heard reduces the physiological stress response regardless of whether the problem is solved. The conversation is the intervention, not just a step toward one.",
    myth_9_myth: "Real fathers just instinctively know what to do.", myth_9_fact: "Parenting is a skill, not an instinct. Research shows active involvement — even when uncertain — builds stronger bonds than waiting to feel confident.",
    myth_10_myth: "Mental health problems are permanent once they start.", myth_10_fact: "The majority of people who experience depression, anxiety, or burnout fully recover. Early support significantly improves outcomes.",
    res_1_title: "Men benefit from therapy just as much as women — when they try it", res_1_body: "Large-scale meta-analyses find no significant difference in therapy outcomes between men and women for anxiety and depression. Men who engage with treatment recover at the same rate. The gap is not in effectiveness — it's in the decision to reach out.",
    res_2_title: "Exercise works as well as medication for mild depression", res_2_body: "A 2023 meta-analysis of 218 studies found that physical activity is as effective as antidepressants for mild to moderate depression. Even 20 minutes of moderate exercise three times a week produced measurable improvements in mood within four weeks.",
    res_3_title: "Men with close friendships live longer", res_3_body: "Harvard's 85-year study on adult development found that the quality of close relationships is the single strongest predictor of health and happiness in later life — stronger than wealth, IQ, or social class. Men with at least one close confidant reported significantly better mental and physical health.",
    res_4_title: "Loneliness is as harmful as smoking 15 cigarettes a day", res_4_body: "Research from Brigham Young University found that loneliness increases the risk of early death by 26%. For men — who are more likely to lose social connections after leaving work or education — the risk is particularly high.",
    res_5_title: "Putting feelings into words calms the brain", res_5_body: "Neuroscience research using fMRI scans shows that naming emotions (called 'affect labelling') significantly reduces activity in the amygdala — the brain's alarm system. You don't need therapy to get this effect. Writing, voice notes, or a real conversation all work.",
    res_6_title: "One bad night's sleep increases emotional reactivity by 60%", res_6_body: "After less than 6 hours of sleep, the prefrontal cortex shows reduced activity — impairing emotional regulation and rational thinking. Men consistently underestimate how much sleep affects their stress tolerance, patience, and decision-making.",
    res_7_title: "Fatherhood measurably changes the brain", res_7_body: "Studies show new fathers experience hormonal changes — including drops in testosterone and rises in oxytocin — that support bonding. Men who are actively involved in childcare in the first year show stronger neural responses to their child's emotional cues.",
    res_8_title: "Shared activity is a valid form of emotional support for men", res_8_body: "Research on male bonding shows that 'doing together' — shared activity, problem-solving, side-by-side presence — is often as effective as direct emotional conversation. This isn't avoidance; it's a different but equally valid pathway to connection.",
    res_9_title: "Strong work identity increases mental health risk after job loss", res_9_body: "Men who strongly identify with their job show significantly higher rates of depression and anxiety after redundancy or retirement. Studies recommend building multiple identity sources — partner, father, friend, hobbyist — as a buffer against work-related identity loss.",
    res_10_title: "8 weeks of mindfulness reduces stress hormones", res_10_body: "An 8-week mindfulness programme produced measurable reductions in cortisol (the body's primary stress hormone) and self-reported stress in working men. The most effective approach: short daily practice rather than longer weekly sessions.",

    min_read: "min lesing", want_deeper: "Vil du gå dypere? Programmet", days_step: "(", days_takes: "dager) tar deg gjennom det steg for steg.",
    start_programme_btn: "Start programmet",
    art_a1_title: "Prestasjonsangst når kravene tar overhånd", art_a1_cat: "Prestasjon",
    art_a1_body: ["Prestasjonsangst kommer sjelden fra selve oppgaven. Den kommer fra hva du tror det sier om deg hvis noe går galt.", "Kroppens alarmrespons, rask puls, uro, racende tanker, er den samme enten trusselen er en bjørn eller en presentasjon. Hjernen din prøver å beskytte deg. Den er bare litt for ivrig.", "Det som hjelper: senk det mentale innsatsnivået («dette er ett møte, ikke en dom»), pust lenger ut enn inn, og øv på situasjonen i små doser i stedet for å unngå den.", "Unngåelse gir lettelse i dag og mer angst i morgen. Gradvis eksponering gjør det motsatte."],
    art_a2_title: "Sinne er ofte noe annet", art_a2_cat: "Sinne",
    art_a2_body: ["For mange menn er sinne den eneste følelsen som virker «tillatt». Under ligger ofte noe annet: bekymring, skam, hjelpeløshet, sårhet.", "Neste gang du kjenner det stige: prøv å sette ord på hva som skjedde et sekund før. Følte du deg overkjørt? Ikke hørt? Redd for å mislykkes?", "Sinne er ikke farlig i seg selv. Det er informasjon. Spørsmålet er hva du gjør med det, og om folk rundt deg må bære kostnaden.", "En praktisk regel: pause før du svarer når pulsen er høy. Du kan alltid komme tilbake til samtalen. Det du sier i fullt sinne kan du sjelden ta tilbake."],
    art_a3_title: "Ensomhet blant menn", art_a3_cat: "Ensomhet",
    art_a3_body: ["Mange menn har kolleger, treningspartnere og familie, og er likevel ensomme. Fordi ingen av de relasjonene har rom for det som faktisk tynger dem.", "Mannlige vennskap bygges ofte rundt aktivitet, ikke samtale. Det er ikke feil, men det betyr at det tunge aldri får plass.", "Den gode nyheten: det trengs mindre enn du tror. Én ærlig setning, «det har faktisk vært en tøff periode», åpner mer enn hundre overflatiske samtaler.", "Start med vennen du tror takler det best. Han har sannsynligvis ventet på en sjanse til å si noe ekte selv."],
    art_a4_title: "Hvem er jeg uten jobben?", art_a4_cat: "Identitet",
    art_a4_body: ["Når identiteten din i stor grad er bygget på det du oppnår, blir et karriereskifte, en oppsigelse eller pensjonering mer enn praktisk. Det blir eksistensielt.", "Spør deg selv: hva satte folk pris på hos meg før tittelen? Temperamentet ditt? Roen din? Evnen til å fikse ting? Det forsvinner ikke med jobben.", "Overgangsperioder er ubehagelige fordi det gamle er borte og det nye ikke har tatt form ennå. Det er en mellomfase, ikke et endelig mål.", "Bruk tiden til å utforske, ikke konkludere. Identitet bygges gjennom handling, ikke grubling."],
    art_a5_title: "Førstegangsfar", art_a5_cat: "Farskap",
    art_a5_body: ["Mange fedre kjenner en blanding av kjærlighet, avstand og utilstrekkelighet de første månedene. Det er vanlig, og nesten ingen snakker om det.", "Tilknytning kommer ikke alltid som et lynnedslag. For mange bygges den gradvis, gjennom bleieskift, bæring og søvnløse netter. Det teller like mye.", "Du trenger ikke være perfekt. Forskningen er tydelig: «godt nok» og å rette opp etter feil er det som bygger trygge barn.", "Og: ta vare på forholdet. De første årene med små barn er en av de tyngste periodene for et par. Korte, ærlige innsjekker med partneren din er undervurdert."],
    art_a6_title: "Utbrenthet: hvordan kjenne det igjen før det er for sent", art_a6_cat: "Utbrenthet",
    art_a6_body: ["Utbrenthet varsler ikke sin ankomst. Den sniker seg inn som redusert motivasjon, kortere tålmodighet, og en voksende følelsesløshet overfor ting som pleide å bety noe.", "De tre kjernetegnene: emosjonell utmattelse (ingenting igjen å gi), depersonalisering (føle seg avkoblet, gå gjennom bevegelsene), og en redusert følelse av mestring.", "Menn maskerer ofte utbrenthet med mer jobb, alkohol, eller tilbaketrekning. Instinktet om å presse seg gjennom er forståelig, men det akselererer prosessen.", "Restitusjon tar tid. Det første steget er som regel det vanskeligste: å innrømme for deg selv at noe er galt."],
    art_a7_title: "Hvordan menn sørger, og hvorfor det ser annerledes ut", art_a7_cat: "Sorg",
    art_a7_body: ["Menn sørger. De gjør det bare ofte ikke slik vi forventer at sorg skal se ut.", "Der kvinner oftere bearbeider tap gjennom å snakke, sørger menn oftere gjennom handling: å holde seg opptatt, ta seg av praktiske ting, trene, eller trekke seg tilbake midlertidig.", "Ingen av delene er bedre. Begge er gyldige. Faren for menn er når midlertidig tilbaketrekning blir permanent unngåelse.", "Hvis du har mistet noen: du trenger ikke snakke om det. Men legg merke til når følelsesløsheten slutter å være en fase og begynner å bli en mur."],
    art_a8_title: "Når stress viser seg i kroppen", art_a8_cat: "Stress",
    art_a8_body: ["Mange menn merker stress fysisk før de merker det følelsesmessig: stramme skuldre, sammenbitte kjever, søvnproblemer, tetthet i brystet, hodepine.", "Dette er ikke svakhet, det er slik nervesystemet fungerer. Stress er en fysisk tilstand, ikke bare en tanke.", "Kroppen vet ofte at noe er galt før sinnet innrømmer det. Hvis du skjærer tenner om natten, er det verdt å spørre: hva bærer jeg på som jeg ikke har satt ord på ennå?", "Korttidstiltak som virker: kaldt vann i ansiktet, sakte utpust, fysisk bevegelse, og å bytte omgivelser, selv kort."],
    art_a9_title: "Hvordan starte en vanskelig samtale", art_a9_cat: "Relasjoner",
    art_a9_body: ["De fleste vanskelige samtalene skjer aldri fordi ingen av partene vet hvordan de skal starte. Stillheten vokser. Avstanden øker.", "En enkel åpning som virker: «Jeg vil snakke om noe, og jeg er ikke sikker på hvordan jeg skal si det.» Det signaliserer ærlighet, og gir deg et øyeblikk til å finne ordene.", "Velg tidspunktet med omhu: ikke rett etter en konflikt, ikke ved leggetid, ikke foran andre. En tur side om side er ofte lettere enn ansikt til ansikt.", "Du trenger ikke løse alt i én samtale. Å starte er nok."],
    art_a10_title: "Søvn og mental helse: koblingen de fleste menn undervurderer", art_a10_cat: "Søvn",
    art_a10_body: ["Dårlig søvn er både et symptom på og en årsak til dårlig mental helse. Sammenhengen går begge veier.", "Etter én natt med under 6 timers søvn øker den følelsesmessige reaktiviteten med opptil 60 %. Du blir mer tilbøyelig til å kjefte, trekke deg unna, katastrofetenke, eller ta dårlige avgjørelser.", "Menn underrapporterer konsekvent søvnproblemer. Det kulturelle manuset sier press deg gjennom. Forskningen sier at det er noe av det dyreste du kan gjøre.", "Praktisk: et fast oppvåkningstidspunkt (også i helgene) er mer effektivt enn tidlig leggetid. Reduser skjermbruk 30 minutter før leggetid, ikke på grunn av lyset, men for å la sinnet roe seg ned."],
    myth_1_myth: "Ekte menn ordner ting selv.", myth_1_fact: "Å be om hjelp krever mer selvtillit enn å late som alt er fint. De fleste som har gjort det angrer bare på at de ventet så lenge.",
    myth_2_myth: "Å snakke om problemer gjør dem større.", myth_2_fact: "Forskning viser det motsatte: å sette ord på følelser reduserer aktiviteten i hjernens alarmsystem.",

let communityPosts = [];

function formatAge(ts) {
  if (!ts || !ts.toDate) return 'now';
  const diff = Math.floor((Date.now() - ts.toDate().getTime()) / 1000);
  if (diff < 60) return 'now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h';
  return Math.floor(diff / 86400) + 'd';
}

async function initFirebase() {
  if (typeof firebase === 'undefined') { communityLoaded = true; return; }
  try {
    firebase.initializeApp({
      apiKey: "AIzaSyC0ylzSJstFSU30DGNTMbVPYmdqkNZnghQ",
      authDomain: "together-4188b.firebaseapp.com",
      projectId: "together-4188b",
      storageBucket: "together-4188b.firebasestorage.app",
      messagingSenderId: "586820726250",
      appId: "1:586820726250:web:14cc5e82c3d70b7bb05693"
    });
    fbAuth = firebase.auth();
    fbDb = firebase.firestore();
    const cred = await fbAuth.signInAnonymously();
    fbUser = cred.user;
    setupCommunityListener();
  } catch(e) {
    console.warn('Firebase init failed:', e);
    communityLoaded = true;
    if (currentTab === 'community') render();
  }
}

function setupCommunityListener() {
  if (communityUnsubscribe) communityUnsubscribe();
  communityUnsubscribe = fbDb.collection('posts')
    .orderBy('createdAt', 'desc')
    .limit(100)
    .onSnapshot(snap => {
      communityPosts = snap.docs.map(doc => {
        const d = doc.data();
        return { id: doc.id, who: d.who, userId: d.userId, channel: d.channel, text: d.text,
          prompt: d.prompt || null, support: d.support || 0, beenThere: d.beenThere || 0,
          reports: d.reports || 0, age: formatAge(d.createdAt), mine: d.userId === fbUser?.uid };
      }).filter(p => p.reports < REPORT_HIDE_THRESHOLD || p.mine);
      communityLoaded = true;
      if (currentTab === 'community') render();
    }, () => { communityLoaded = true; if (currentTab === 'community') render(); });
}

    body: ["Performance anxiety rarely comes from the task itself. It comes from what you think it means about you if things go wrong.", "Your body's alarm response — racing heart, restlessness, racing thoughts — is the same whether the threat is a bear or a presentation. Your brain is trying to protect you. It's just a bit too eager.", "What helps: lower the mental stakes ('this is one meeting, not a verdict'), breathe longer on the exhale than the inhale, and practise the situation in small doses rather than avoiding it.", "Avoidance brings relief today and more anxiety tomorrow. Gradual exposure does the opposite."] },

function daysAgo(n) { const d = new Date(); d.setDate(d.getDate() - n); return d.toISOString().slice(0, 10); }
function moodOn(dateStr) { return state.moods[dateStr] ? state.moods[dateStr].level : null; }
function lastNDates(n) { const out = []; for (let i = n - 1; i >= 0; i--) out.push(daysAgo(i)); return out; }
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function toast(msg) {
  const el = document.createElement("div");
  el.className = "toast"; el.textContent = msg;
  document.getElementById("app").appendChild(el);
  setTimeout(() => el.remove(), 2600);
}
function streak() {
  let n = 0;
  for (let i = 0; ; i++) {
    if (state.moods[daysAgo(i)]) n++;
    else if (i === 0) continue;
    else break;
  }
  return n;
}

function computeNudges() {
  const nudges = [];
  const dismissed = (key) => state.dismissedNudges[key] === todayStr();
  const last3 = [daysAgo(0), daysAgo(1), daysAgo(2)].map(moodOn);
  if (last3.every(l => l !== null && l <= 2) && !dismissed("low3")) {
    nudges.push({ key: "low3", warm: false,
      text: t("nudge_low3"),
      actions: [{ label: t("nudge_low3_action"), fn: () => { currentTab = "training"; render(); } }] });
  }
  const todayLvl = moodOn(todayStr()), y = moodOn(daysAgo(1));
  if (todayLvl !== null && y !== null && Math.abs(todayLvl - y) >= 2 && !dismissed("jump")) {
    nudges.push({ key: "jump", warm: false,
      text: t("nudge_jump"),
      actions: [{ label: t("nudge_jump_action"), fn: () => { focusNote = true; render(); } }] });
  }
  const last14 = lastNDates(14).map(moodOn).filter(l => l !== null);
  if (last14.length >= 10 && last14.every(l => l <= 2) && !dismissed("low14")) {
    nudges.push({ key: "low14", warm: true,
      text: t("nudge_low14"),
      actions: [{ label: t("nudge_low14_action"), fn: openSOS }] });
  }
  const last7 = lastNDates(7).map(moodOn).filter(l => l !== null);
  if (last7.length >= 5 && last7.every(l => l >= 3) && !dismissed("high")) {
    nudges.push({ key: "high", warm: false,
      text: t("nudge_high"),
      actions: [{ label: t("nudge_high_action"), fn: () => { currentTab = "community"; render(); } }] });
  }
  return nudges;
}

function inactivityNudge() {
  for (let i = 0; i < 4; i++) if (state.moods[daysAgo(i)]) return null;
  if (Object.keys(state.moods).length === 0) return null;
  return t("inactivity_nudge");
}

function weekKey() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const wk = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(wk).padStart(2, '0')}`;
}

function renderMoodChart() {
  const days = 30, bw = 7, gap = 2, h = 68;
  const colors = ['var(--border)', '#e8a090', '#c9d4b8', '#7dc4c4', 'var(--teal)'];
  const today = new Date();
  const bars = Array.from({ length: days }, (_, i) => {
    const d = new Date(today); d.setDate(d.getDate() - (days - 1 - i));
    const lvl = (state.moods[d.toISOString().slice(0, 10)] || {}).level || 0;
    const bh = lvl ? Math.round((lvl / 4) * h) : 3;
    return `<rect x="${i * (bw + gap)}" y="${h - bh}" width="${bw}" height="${bh}" rx="2" fill="${colors[lvl]}"/>`;
  }).join('');
  const tw = days * (bw + gap) - gap;
  return `<svg viewBox="0 0 ${tw} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block;margin:10px 0 4px">${bars}</svg>
    <div style="display:flex;justify-content:space-between;font-size:0.68rem;color:var(--text-soft)"><span>${t("days_ago_30")}</span><span>${t("today_lbl")}</span></div>`;
}

function suggestedExercise() {

  return EXERCISES.find(e => e.id === "move");
}

let breathRaf = null;
let breathPhaseIdx = 0;
const BREATH_C = 2 * Math.PI * 80;
function breathPhases() {
  return [
    { name: t("breath_in"),  startOff: BREATH_C, endOff: 0 },
    { name: t("breath_hold"), startOff: 0,         endOff: 0 },
    { name: t("breath_out"), startOff: 0,         endOff: BREATH_C },
    { name: t("breath_hold"), startOff: BREATH_C,  endOff: BREATH_C },

}

function openBreath() {
  breathPhaseIdx = 0;
  const ov = document.createElement("div");
  ov.id = "breathOverlay";
  ov.innerHTML = `
    <div class="closeRow"><button onclick="closeBreath()">&#10005;</button></div>
    <div id="breathStage">
      <div id="breathBox" style="position:relative;">
        <svg viewBox="0 0 200 200" width="220" height="220">
          <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="10"/>
          <circle id="breathRing" cx="100" cy="100" r="80" fill="none" stroke="white" stroke-width="10"
            stroke-dasharray="${BREATH_C.toFixed(2)}" stroke-dashoffset="${BREATH_C.toFixed(2)}"
            stroke-linecap="round" transform="rotate(-90 100 100)"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;">
          <div id="breathPhaseText" style="font-size:15px;font-weight:600;color:rgba(255,255,255,0.9);text-align:center;">${t("breath_press_start")}</div>
          <div id="breathCountText" style="font-size:44px;font-weight:700;color:white;line-height:1;margin-top:4px;min-height:1em;text-align:center;"></div>
        </div>
      </div>
      <div id="breathCycleText" style="font-size:0.8rem;opacity:0.65;margin-top:-4px;min-height:1.2em"></div>
      <div class="tempo">${t("breath_pace")} <b id="tempoVal">4</b> ${t("breath_sec_phase")}
        <input type="range" id="tempoRange" min="3" max="6" step="0.5" value="4">
      </div>
    </div>
    <div class="controls">
      <button class="btn" id="breathStart">${t("breath_start")}</button>
      <button class="btn" style="background:rgba(255,255,255,0.18);color:#fff;border:1.5px solid rgba(255,255,255,0.45)" onclick="endBreath()">${t("breath_end_session")}</button>
    </div>`;
  document.getElementById("app").appendChild(ov);
  document.getElementById("tempoRange").oninput = ev => document.getElementById("tempoVal").textContent = ev.target.value;
  document.getElementById("breathStart").onclick = toggleBreath;
}
function endBreath() { completeExercise("breath"); closeBreath(); }
function toggleBreath() {
  const btn = document.getElementById("breathStart");
  if (breathRaf) {
    stopBreathCycle();
    btn.textContent = t("breath_continue");
    const pt = document.getElementById("breathPhaseText");
    if (pt) pt.textContent = t("breath_paused");
    const ct = document.getElementById("breathCountText");
    if (ct) ct.textContent = "";
    return;
  }
  btn.textContent = t("breath_pause");
  runBreathCycle();
}
function runBreathCycle() {
  let phaseStart = null;
  const phases = breathPhases();
  const tick = ts => {
    const ring = document.getElementById("breathRing");
    if (!ring) { breathRaf = null; return; }
    const tempo = parseFloat(document.getElementById("tempoRange").value) * 1000;
    if (phaseStart === null) phaseStart = ts;
    const frac = Math.min((ts - phaseStart) / tempo, 1);
    const ph = phases[breathPhaseIdx % 4];
    ring.style.strokeDashoffset = ph.startOff + (ph.endOff - ph.startOff) * frac;
    document.getElementById("breathPhaseText").textContent = ph.name;
    const secs = Math.ceil((tempo - (ts - phaseStart)) / 1000);
    document.getElementById("breathCountText").textContent = secs > 0 ? secs : "";
    const cycleEl = document.getElementById("breathCycleText");
    if (cycleEl) cycleEl.textContent = `${t("breath_round")} ${Math.floor(breathPhaseIdx / 4) + 1}`;
    if (frac >= 1) { breathPhaseIdx++; phaseStart = null; }
    breathRaf = requestAnimationFrame(tick);
  };
  breathRaf = requestAnimationFrame(tick);
}
function stopBreathCycle() { if (breathRaf) { cancelAnimationFrame(breathRaf); breathRaf = null; } }
function closeBreath() { stopBreathCycle(); const ov = document.getElementById("breathOverlay"); if (ov) ov.remove(); }

const _origTexts = {};
async function translatePost(id) {
  const el = document.getElementById('body_' + id);
  const btn = document.getElementById('trbtn_' + id);
  if (!el || !btn) return;
  if (!_origTexts[id]) _origTexts[id] = el.textContent;
  if (btn.dataset.on === '1') {
    el.textContent = _origTexts[id];
    btn.dataset.on = '0';
    btn.textContent = t("translate_btn");
    return;
  }
  btn.textContent = '…';
  btn.disabled = true;
  const lang = L();
  if (lang === 'en') { btn.textContent = t("translate_btn"); btn.disabled = false; return; }
  try {
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(_origTexts[id])}&langpair=en|${lang}`);
    const d = await res.json();
    if (d.responseStatus === 200) {
      el.textContent = d.responseData.translatedText;
      btn.dataset.on = '1';
      btn.textContent = t("show_original_btn");
    } else { toast(t("could_not_translate")); btn.textContent = t("translate_btn"); }
  } catch(e) { toast(t("could_not_translate")); btn.textContent = t("translate_btn"); }
  btn.disabled = false;
}

function submitPost() {

  const channel = document.getElementById("postChannel").value;
  if (!text) return;

  if (CRISIS_PATTERNS.test(text)) {
    closeModal();

function finalizePost() { if (pendingPost) { doPublish(pendingPost.text, pendingPost.channel, pendingPost.prompt); pendingPost = null; } }
async function doPublish(text, channel, prompt) {
  closeModal();
  if (fbDb && fbUser) {
    try {
      await fbDb.collection('posts').add({
        who: state.pseudonym, userId: fbUser.uid,
        channel, text, prompt: prompt || null,
        support: 0, beenThere: 0,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()

      console.warn('Post failed:', e);

  } else {

    render();
  }

}

function toggleNotif(on) {
  state.settings.notifications = on; save();
  if (on) setupDailyNotifications(true);
  else cancelDailyNotifications();
}
async function cancelDailyNotifications() {
  if (!window.Capacitor?.isNativePlatform?.()) return;
  const LN = window.Capacitor?.Plugins?.LocalNotifications;
  if (!LN) return;
  try {
    const { notifications: pending } = await LN.getPendingNotifications();
    if (pending.length) await LN.cancel({ notifications: pending });
  } catch (e) { console.log("Notif cancel failed:", e); }
}
function saveNotifTime(t) {
  state.settings.notifTime = t; save();
  if (state.settings.notifications) setupDailyNotifications(true);
}
async function setupDailyNotifications(force) {
  if (!state.settings.notifications) return;
  const [hour, min] = (state.settings.notifTime || "09:00").split(":").map(Number);

  if (window.Capacitor?.isNativePlatform?.()) {
    const LN = window.Capacitor?.Plugins?.LocalNotifications;
    if (!LN) return;
    try {
      const { display } = await LN.requestPermissions();
      if (display !== "granted") return;
      // Android 8+ requires the channel to exist or the notification won't show. iOS ignores this.
      try {
        await LN.createChannel({ id: "daily-reminder", name: "Daily reminder",
          description: "Your daily check-in reminder", importance: 4, visibility: 1 });
      } catch (e) { /* not supported on iOS; ignore */ }
      const { notifications: pending } = await LN.getPendingNotifications();
      if (!force && pending.length > 10) return;
      if (pending.length) await LN.cancel({ notifications: pending });
      const dayBase = Math.floor(Date.now() / 86400000);
      const toSchedule = [];
      for (let i = 1; i <= 45; i++) {
        const at = new Date();
        at.setDate(at.getDate() + i);
        at.setHours(hour, min, 0, 0);
        if (at > new Date()) {
          const msg = DAILY_MESSAGES[(dayBase + i) % DAILY_MESSAGES.length];
          toSchedule.push({ id: 3000 + i, title: "Together", body: msg.text, schedule: { at }, channelId: "daily-reminder" });
        }
      }
      await LN.schedule({ notifications: toSchedule });
    } catch (e) { console.log("Notif setup failed:", e); }
    return;
  }
  if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission();
  }
}
function saveCrisisContact(v) { state.settings.crisisContact = v; save(); toast(t("saved")); }
function openBackup() {
  const data = JSON.stringify(state);
  openModal(`
    <h3>${t("backup_my_data")}</h3>
    <div class="sub" style="margin-bottom:12px">${t("backup_desc")}</div>
    <textarea id="backupText" readonly rows="6" style="width:100%;font-family:monospace;font-size:0.78rem">${esc(data)}</textarea>
    <button class="btn" style="width:100%;margin-top:12px" onclick="copyBackup()">${t("copy_backup")}</button>
    ${navigator.share ? `<button class="btn secondary" style="width:100%;margin-top:8px" onclick="shareBackup()">${t("share_btn")}</button>` : ""}
    <button class="btn secondary" style="width:100%;margin-top:8px" onclick="closeModal()">${t("close")}</button>
  `);
}
function copyBackup() {
  const ta = document.getElementById("backupText");
  const done = () => toast(t("backup_copied"));
  if (navigator.clipboard) navigator.clipboard.writeText(ta.value).then(done, () => { ta.select(); document.execCommand("copy"); done(); });
  else { ta.select(); document.execCommand("copy"); done(); }
}
async function shareBackup() {
  try { await navigator.share({ title: "Together backup", text: document.getElementById("backupText").value }); } catch(e) {}
}
function openRestore() {
  openModal(`
    <h3>${t("restore_from_backup")}</h3>
    <div class="sub" style="margin-bottom:12px">${t("restore_desc")}</div>
    <textarea id="restoreText" rows="6" placeholder="${t("restore_ph")}" style="width:100%;font-family:monospace;font-size:0.78rem"></textarea>
    <button class="btn" style="width:100%;margin-top:12px;background:#b9503c" onclick="confirmRestore()">${t("restore_replace")}</button>
    <button class="btn secondary" style="width:100%;margin-top:8px" onclick="closeModal()">${t("cancel")}</button>
  `);
}
function confirmRestore() {
  const raw = (document.getElementById("restoreText").value || "").trim();
  if (!raw) { toast(t("paste_first")); return; }
  let obj;
  try { obj = JSON.parse(raw); } catch(e) { toast(t("invalid_backup")); return; }
  if (!obj || typeof obj !== "object" || !("pseudonym" in obj)) { toast(t("not_together_backup")); return; }
  state = Object.assign(structuredClone(defaultState), obj);
  state.settings = Object.assign(structuredClone(defaultState.settings), obj.settings || {});
  save(); closeModal(); toast(t("data_restored")); render();
}
function openBugReport() {
  openModal(`
    <h3>Report a bug</h3>
    <div class="sub" style="margin-bottom:16px">Describe what happened and we'll look into it.</div>
    <textarea id="bugText" rows="5" placeholder="What happened? What did you expect?"></textarea>
    <button class="btn" style="width:100%;margin-top:12px" onclick="submitBugReport()">Send report</button>
    <button class="btn secondary" style="width:100%;margin-top:8px" onclick="closeModal()">Cancel</button>
  `);
}
async function submitBugReport() {
  const ta = document.getElementById('bugText');
  if (!ta || !ta.value.trim()) { toast("Please describe the bug first."); return; }
  const btn = document.querySelector('.modal .btn');
  if (btn) { btn.disabled = true; btn.textContent = "Sending…"; }
  try {
    const res = await fetch('https://formspree.io/f/mbdewpeo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ message: ta.value.trim(), _subject: 'Together – Bug report' })
    });
    const data = await res.json();
    if (data.ok) { closeModal(); toast("Thanks — bug report sent."); }
    else { toast("Could not send. Please try again."); if (btn) { btn.disabled = false; btn.textContent = "Send report"; } }
  } catch(e) {
    toast("Could not send. Please try again.");
    if (btn) { btn.disabled = false; btn.textContent = "Send report"; }
  }
}

    "no": { emergency: "113", lines: [{ name: "Mental Helse", sub: "Free · 24/7 · Norway", tel: "116123", display: "116 123" }, { name: "Kirkens SOS", sub: "Free · 24/7 · Norway", tel: "22400040", display: "22 40 00 40" }] },

    "de": { emergency: "112", lines: [{ name: "Telefonseelsorge", sub: "Free · 24/7 · Germany", tel: "08001110111", display: "0800 111 0 111" }] },
    "fr": { emergency: "15", lines: [{ name: "Numéro national prévention suicide", sub: "Free · 24/7 · France", tel: "3114", display: "3114" }] },
    "nl": { emergency: "112", lines: [{ name: "0800-0113", sub: "Free · 24/7 · Netherlands", tel: "08000113", display: "0800-0113" }] },
    "es": { emergency: "112", lines: [{ name: "Línea de atención a conducta suicida", sub: "Free · 24/7 · Spain", tel: "024", display: "024" }] },
    "it": { emergency: "112", lines: [{ name: "Telefono Amico", sub: "Italy", tel: "0223272327", display: "02 2327 2327" }] },
    "pt-br": { emergency: "192", lines: [{ name: "CVV", sub: "Free · 24/7 · Brazil", tel: "188", display: "188" }] },
    "en-us": { emergency: "911", lines: [{ name: "988 Suicide & Crisis Lifeline", sub: "Call or text · 24/7 · US", tel: "988", display: "988" }], text: "Text HOME to 741741" },
    "en-au": { emergency: "000", lines: [{ name: "Lifeline", sub: "Free · 24/7 · Australia", tel: "131114", display: "13 11 14" }] },
    "en-nz": { emergency: "111", lines: [{ name: "Lifeline", sub: "Free · 24/7 · New Zealand", tel: "08005435354", display: "0800 543 354" }] },

  closeModal();
  const w = document.createElement("div");

  w.onclick = (e) => { if (e.target === w) closeModal(); };
